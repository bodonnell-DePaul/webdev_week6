name: Deploy ReleaseBoard Frontend To Azure

on:
  push:
    branches:
      - main
    paths:
      - enterprise-cicd-demo/client/**
      - enterprise-cicd-demo/infrastructure/main.bicep
      - .github/workflows/deploy-azure-frontend.yml
  workflow_dispatch:
    inputs:
      environmentName:
        description: Deployment environment name passed to Bicep
        required: false
        default: staging
      location:
        description: Azure region for resource group and deployment
        required: false
        default: eastus

permissions:
  contents: read
  id-token: write

env:
  WORKING_DIR: enterprise-cicd-demo/client
  BICEP_FILE: enterprise-cicd-demo/infrastructure/main.bicep

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environmentName || 'staging' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group exists
        env:
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          AZURE_LOCATION: ${{ github.event.inputs.location || 'eastus' }}
        run: az group create --name "$AZURE_RESOURCE_GROUP" --location "$AZURE_LOCATION"

      - name: Deploy infrastructure with Bicep and capture API hostname
        id: bicep
        env:
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          ENVIRONMENT_NAME: ${{ github.event.inputs.environmentName || 'staging' }}
          AZURE_LOCATION: ${{ github.event.inputs.location || 'eastus' }}
        run: |
          API_HOST_NAME=$(az deployment group create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file "${{ env.BICEP_FILE }}" \
            --parameters environmentName="$ENVIRONMENT_NAME" location="$AZURE_LOCATION" \
            --query properties.outputs.apiHostName.value \
            --output tsv)

          if [ -z "$API_HOST_NAME" ]; then
            echo "Bicep output apiHostName is empty."
            exit 1
          fi

          echo "apiBaseUrl=https://$API_HOST_NAME" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: enterprise-cicd-demo/client/package-lock.json

      - name: Install and test frontend
        working-directory: enterprise-cicd-demo/client
        run: |
          npm ci
          npm run lint
          npm test

      - name: Build frontend with API URL
        working-directory: enterprise-cicd-demo/client
        env:
          VITE_API_BASE_URL: ${{ steps.bicep.outputs.apiBaseUrl }}
        run: npm run build

      - name: Deploy frontend to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: enterprise-cicd-demo/client
          output_location: dist

      - name: Deployment summary
        run: |
          echo "Frontend build deployed with API base URL ${{ steps.bicep.outputs.apiBaseUrl }}" >> "$GITHUB_STEP_SUMMARY"
